<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Very Important Question ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <img
            id="gif"
            src="gifs/hipanda.gif"
            alt="Panda"
        >

        <h1 id="question">
            🐻 Hi there...
        </h1>

        <p id="subtitle">
            A very important panda question 🐼💕
        </p>

        <div class="buttons">

            <button id="continueBtn">
                Continue ➜
            </button>

            <button
                id="yesBtn"
                style="display:none;"
            >
                Yes ❤️
            </button>

            <button
                id="noBtn"
                style="display:none;"
            >
                No 😔
            </button>

        </div>

    </div>

    <!-- Floating background elements -->

    <div class="floating-hearts">

        <span>🐼</span>
        <span>❤️</span>
        <span>💕</span>
        <span>🐻</span>
        <span>💖</span>
        <span>🐼</span>
        <span>💗</span>
        <span>💕</span>
        <span>🌸</span>
        <span>🐻</span>

    </div>

    <script src="script.js"></script>

</body>
</html>
